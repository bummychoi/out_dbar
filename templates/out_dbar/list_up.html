<link rel="stylesheet" href="{{ url_for('static', filename='css/list_up.css') }}">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>

<script src="{{ url_for('static', filename='js/input_form.js') }}"></script>

<!-- <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script> -->

<div class="vessel-header">

    <label>회사</label>
    <select id="company" onchange="changeCompany()">
        <option value="hyundai" {% if ship and ship.company=='hyundai' %}selected{% endif %}>
            현대제철
        </option>

        <option value="dongkuk" {% if ship and ship.company=='dongkuk' %}selected{% endif %}>
            동국제강
        </option>
    </select>

    <label>선적월</label>
    <input type="month" id="ship_month" value="{{ ship.ship_month if ship else '' }}">

    <label>선적명</label>
    <input type="text" id="shipmentName" value="{{ ship.vessel_name if ship else '' }}">

    <button class="ship-add" onclick="shipment()">
        💾등록
    </button>

    <button class="btn-add" onclick="addRow()">
        + 행추가
    </button>

    <button class="btn-save" onclick="savePlan()">
        💾 저장<br>/수정
    </button>

    <button class="btn-cancel" onclick="closePopup()">
        X 취소
    </button>
    <button class="btn-alldel" onclick="alldel()">
        전체삭제
    </button>
</div>

<table id="detailTable" class="detail-table">

    <thead>
        <tr>
            <th class="color-col">단면색</th>
            <th>강종</th>
            <th>싸이즈</th>
            <th>길이</th>
            <th>번들</th>
            <th>톤수</th>
            <th>삭제</th>
        </tr>
    </thead>

    <tbody>

        {% if details %}

        {% for row in details %}
        <tr>

            <td class="color-col">
                <select class="color-select" onchange="changeColor(this)">
                    <option value="">선택</option>
                    <option value="red" {% if row.color_name=='red' %}selected{% endif %}>🔴빨강</option>
                    <option value="orange" {% if row.color_name=='orange' %}selected{% endif %}>🟠주황</option>
                    <option value="yellow" {% if row.color_name=='yellow' %}selected{% endif %}>🟡노랑</option>
                    <option value="green" {% if row.color_name=='green' %}selected{% endif %}>🟢녹색</option>
                    <option value="blue" {% if row.color_name=='blue' %}selected{% endif %}>🔵파란</option>
                    <option value="purple" {% if row.color_name=='purple' %}selected{% endif %}>🟣보라</option>
                </select>
            </td>
            <input type="hidden" id="ship_id" value="{{ ship.id }}">
            <td><input type="text" class="grid-input" value="{{ row.steel_type }}"></td>
            <td><input type="text" class="grid-input" value="{{ row.size_name }}"></td>
            <td><input type="number" class="grid-input" value="{{ row.length_m }}"></td>
            <td><input type="number" class="grid-input" value="{{ row.bundle_qty }}"></td>
            <td><input type="number" step="0.001" class="grid-input" value="{{ row.weight_mt }}"></td>

            <td>
                <button class="del_btn" onclick="deleteDetail('{{ row.id }}')"><span>삭제</span></button>
            </td>

        </tr>
        {% endfor %}

        {% else %}

        <tr>
            <td class="color-col">
                <select class="color-select" onchange="changeColor(this)">
                    <option value="">선택</option>
                    <option value="red">🔴빨강</option>
                    <option value="orange">🟠주황</option>
                    <option value="yellow">🟡노랑</option>
                    <option value="green">🟢녹색</option>
                    <option value="blue">🔵파란</option>
                    <option value="purple">🟣보라</option>
                </select>
            </td>

            <td><input type="text" class="grid-input"></td>
            <td><input type="text" class="grid-input"></td>
            <td><input type="number" class="grid-input"></td>
            <td><input type="number" class="grid-input"></td>
            <td><input type="number" step="0.001" class="grid-input"></td>

            <td>
                <button class="del_btn"><span>삭제</span></button>
            </td>
        </tr>

        {% endif %}

    </tbody>
</table>

<div class="summary-box">

    <div class="summary-item">
        총 번들 : <span id="total_bundle">0</span>
    </div>

    <div class="summary-item">
        총 톤수 : <span id="total_weight">0.000</span>
    </div>

</div>
